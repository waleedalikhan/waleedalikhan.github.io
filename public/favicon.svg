<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Waleed Ali Khan">
  <title>Waleed Ali Khan</title>

  <!-- Obsidian-raised tile — mirrors the nav brand-mark -->
  <rect width="32" height="32" rx="7" fill="#0a0a0d"/>

  <!-- Hairline-strong inner border — matches border-[color:var(--color-hairline-strong)] -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>

  <!-- Ambient indigo wash, scaled-down version of the site's cursor glow -->
  <defs>
    <radialGradient id="glow" cx="28%" cy="28%" r="70%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>

  <!-- Lowercase geometric 'w' in cyber lime — mirrors the nav wordmark letterform -->
  <path
    d="M6 11 L10.5 22 L16 13 L21.5 22 L26 11"
    stroke="#bef264"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Status-ping dot — echoes the hero availability indicator -->
  <circle cx="25.5" cy="7" r="3.5" fill="#6366f1" fill-opacity="0.28"/>
  <circle cx="25.5" cy="7" r="2.1" fill="#6366f1"/>
</svg>

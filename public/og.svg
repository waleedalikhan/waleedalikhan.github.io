<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Waleed Ali Khan — Product-focused Senior Frontend Architect">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="1" stop-color="#0a0a0d"/>
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="20%" r="50%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="85%" cy="80%" r="55%">
      <stop offset="0" stop-color="#bef264" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#bef264" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- Mark -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="14" fill="#101014" stroke="rgba(255,255,255,0.12)"/>
    <path d="M14 20 L22 42 L28 28 L34 42 L42 20" stroke="#bef264" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <text x="160" y="118" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#e6e7eb">waleed<tspan fill="#bef264">.</tspan>dev</text>

  <!-- Eyebrow -->
  <g transform="translate(80, 240)">
    <rect width="28" height="2" fill="#bef264"/>
    <text x="44" y="6" font-family="JetBrains Mono, monospace" font-size="18" letter-spacing="3.2" fill="#9ca3af">PRODUCT · ARCHITECTURE · SCALE</text>
  </g>

  <!-- Name -->
  <text x="80" y="370" font-family="Inter, sans-serif" font-size="104" font-weight="800" fill="#e6e7eb" letter-spacing="-3">Waleed Ali Khan</text>

  <!-- Title -->
  <text x="80" y="450" font-family="Inter, sans-serif" font-size="36" font-weight="500" fill="#9ca3af">Senior Frontend Architect · 6+ years shipping SaaS</text>

  <!-- Stack row -->
  <g font-family="JetBrains Mono, monospace" font-size="16" fill="#d9f99d" transform="translate(80, 540)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="none" stroke="rgba(190,242,100,0.35)"/>
    <text x="70" y="23" text-anchor="middle">React / Next.js</text>
    <rect x="156" y="0" width="110" height="36" rx="18" fill="none" stroke="rgba(190,242,100,0.35)"/>
    <text x="211" y="23" text-anchor="middle">Svelte 5</text>
    <rect x="282" y="0" width="130" height="36" rx="18" fill="none" stroke="rgba(190,242,100,0.35)"/>
    <text x="347" y="23" text-anchor="middle">Tailwind v4</text>
    <rect x="428" y="0" width="100" height="36" rx="18" fill="none" stroke="rgba(190,242,100,0.35)"/>
    <text x="478" y="23" text-anchor="middle">Astro</text>
  </g>

  <!-- URL -->
  <text x="1120" y="580" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="16" fill="#6b7280">waleedalikhan.github.io</text>
</svg>
